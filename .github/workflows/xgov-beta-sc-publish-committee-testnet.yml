name: Publish xGov Committee (Testnet Integration)

on:
  workflow_dispatch:
    inputs:
      committee_members:
        description: "Override committee_members for testnet publish"
        required: false
        default: ""
        type: string
      committee_votes:
        description: "Override committee_votes for testnet publish"
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  COMMITTEE_INDEX_URL: ${{ vars.COMMITTEE_INDEX_URL }}
  ALGOD_API_BASE: ${{ vars.ALGOD_API_BASE_TESTNET }}
  XGOV_REGISTRY_ID: ${{ vars.XGOV_REGISTRY_ID_TESTNET }}

jobs:
  precheck:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.precheck.outputs.should_publish }}
      reason: ${{ steps.precheck.outputs.reason }}
      target_anchor: ${{ steps.precheck.outputs.target_anchor }}
      committee_id_b64: ${{ steps.precheck.outputs.committee_id_b64 }}
      index_total_members: ${{ steps.precheck.outputs.index_total_members }}
      index_total_votes: ${{ steps.precheck.outputs.index_total_votes }}
      effective_committee_members: ${{ steps.precheck.outputs.effective_committee_members }}
      effective_committee_votes: ${{ steps.precheck.outputs.effective_committee_votes }}
      members_source: ${{ steps.precheck.outputs.members_source }}
      votes_source: ${{ steps.precheck.outputs.votes_source }}
      last_round: ${{ steps.precheck.outputs.last_round }}
      committee_last_anchor: ${{ steps.precheck.outputs.committee_last_anchor }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Run public precheck
        id: precheck
        run: bash ./.github/scripts/committee-precheck.sh
        env:
          COMMITTEE_PRECHECK_MODE: publisher
          COMMITTEE_NETWORK: testnet
          ALGOD_API_BASE: ${{ env.ALGOD_API_BASE }}
          XGOV_REGISTRY_ID: ${{ env.XGOV_REGISTRY_ID }}
          COMMITTEE_INDEX_URL: ${{ env.COMMITTEE_INDEX_URL }}
          COMMITTEE_INPUT_MEMBERS: ${{ github.event.inputs.committee_members }}
          COMMITTEE_INPUT_VOTES: ${{ github.event.inputs.committee_votes }}

  publish:
    runs-on: ubuntu-latest
    needs: precheck
    if: needs.precheck.outputs.should_publish == 'true'
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up AlgoKit
        uses: ./.github/actions/algokit-setup

      - name: Publish committee to testnet
        id: publish
        run: algokit project deploy testnet xgov_registry
        env:
          XGOV_REG_DEPLOY_COMMAND: declare_committee
          XGOV_REGISTRY_APP_ID: ${{ env.XGOV_REGISTRY_ID }}
          XGOV_REG_COMMITTEE_ID_B64: ${{ needs.precheck.outputs.committee_id_b64 }}
          XGOV_REG_COMMITTEE_TOTAL_MEMBERS: ${{ needs.precheck.outputs.effective_committee_members }}
          XGOV_REG_COMMITTEE_TOTAL_VOTES: ${{ needs.precheck.outputs.effective_committee_votes }}
          XGOV_REG_EXPECTED_TARGET_ANCHOR: ${{ needs.precheck.outputs.target_anchor }}
          DEPLOYER_MNEMONIC: ${{ secrets.DEPLOYER_MNEMONIC }}
          DISPENSER_MNEMONIC: ${{ secrets.DISPENSER_MNEMONIC }}

      - name: Summarize integration publish
        run: |
          {
            echo "## Testnet committee integration publish"
            echo
            echo "- Last round: ${{ needs.precheck.outputs.last_round }}"
            echo "- committee_last_anchor: ${{ needs.precheck.outputs.committee_last_anchor }}"
            echo "- Target anchor: ${{ needs.precheck.outputs.target_anchor }}"
            echo "- committeeId: ${{ needs.precheck.outputs.committee_id_b64 }}"
            echo "- Index totalMembers: ${{ needs.precheck.outputs.index_total_members }}"
            echo "- Index totalVotes: ${{ needs.precheck.outputs.index_total_votes }}"
            echo "- Effective committee_members: ${{ needs.precheck.outputs.effective_committee_members }} (${{ needs.precheck.outputs.members_source }})"
            echo "- Effective committee_votes: ${{ needs.precheck.outputs.effective_committee_votes }} (${{ needs.precheck.outputs.votes_source }})"
            echo "- Publish result: submitted"
          } >> "$GITHUB_STEP_SUMMARY"
